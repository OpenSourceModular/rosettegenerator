name: release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-attach-zip:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate version consistency
        run: |
          python - <<'PY'
          import re
          from pathlib import Path

          def extract(pattern, text, source):
              match = re.search(pattern, text, re.MULTILINE)
              if not match:
                  raise SystemExit(f"Could not find version in {source}")
              return match.group(1)

          pyproject = Path("pyproject.toml").read_text(encoding="utf-8")
          setup = Path("setup.py").read_text(encoding="utf-8")
          plugin = Path("__init__.py").read_text(encoding="utf-8")

          versions = {
              "pyproject.toml": extract(r'^version\\s*=\\s*"([^"]+)"', pyproject, "pyproject.toml"),
              "setup.py": extract(r'version\\s*=\\s*"([^"]+)"', setup, "setup.py"),
              "__init__.py": extract(r'__plugin_version__\\s*=\\s*"([^"]+)"', plugin, "__init__.py"),
          }

          unique_versions = sorted(set(versions.values()))
          if len(unique_versions) != 1:
              details = "\n".join(f"  - {k}: {v}" for k, v in versions.items())
              raise SystemExit(f"Version mismatch detected:\n{details}")

          print(f"Version check passed: {unique_versions[0]}")
          PY

      - name: Validate release tag matches version
        if: github.event_name == 'release'
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          python - <<'PY'
          import re
          import os
          from pathlib import Path

          pyproject = Path("pyproject.toml").read_text(encoding="utf-8")
          match = re.search(r'^version\\s*=\\s*"([^"]+)"', pyproject, re.MULTILINE)
          if not match:
              raise SystemExit("Could not find version in pyproject.toml")

          package_version = match.group(1)
          release_tag = os.environ.get("RELEASE_TAG", "")
          expected_tag = f"v{package_version}"

          if release_tag != expected_tag:
              raise SystemExit(
                  f"Release tag/version mismatch: tag={release_tag}, expected={expected_tag}"
              )

          print(f"Release tag check passed: {release_tag}")
          PY

      - name: Create plugin zip
        run: |
          git archive --format=zip --output OctoPrint-RosetteGenerator.zip HEAD

      - name: Upload asset to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: OctoPrint-RosetteGenerator.zip

      - name: Upload artifact for manual runs
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: OctoPrint-RosetteGenerator
          path: OctoPrint-RosetteGenerator.zip
