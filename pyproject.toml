[build-system]
requires = ["setuptools>=65", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "OctoPrint-RosetteGenerator"
version = "0.1.0"
description = "Generate decorative rosette curves and export SVG files from OctoPrint."
readme = { file = "README.md", content-type = "text/markdown" }
authors = [{ name = "RosetteGenerator Contributors" }]
license = { text = "MIT" }
requires-python = ">=3.8,<4"
dependencies = ["shapely>=2.0"]
classifiers = [
	"Framework :: OctoPrint",
	"License :: OSI Approved :: MIT License",
	"Programming Language :: Python :: 3",
	"Programming Language :: Python :: 3 :: Only",
	"Programming Language :: Python :: 3.8",
	"Programming Language :: Python :: 3.9",
	"Programming Language :: Python :: 3.10",
	"Programming Language :: Python :: 3.11",
]

[project.urls]
Homepage = "https://github.com/OpenSourceModular/rosettegenerator"

[project.entry-points."octoprint.plugin"]
rosettegenerator = "rosettegenerator"

[tool.setuptools]
packages = ["rosettegenerator"]
include-package-data = true

[tool.setuptools.package-dir]
rosettegenerator = "."

[tool.setuptools.package-data]
rosettegenerator = [
	"templates/*.jinja2",
	"static/css/*.css",
	"static/js/*.js",
]
